<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EnzoCustom | Audio Configuration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Founders+Grotesk+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      @font-face {
        font-family: 'LeJeuneDeck-Regular';
        src: url('/fonts/LeJeuneDeck-Regular.woff2') format('woff2'),
             url('/fonts/LeJeuneDeck-Regular.woff') format('woff');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      body {
        background-color: #ffffff;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Founders Grotesk Mono', monospace;
        color: #000000;
      }

      .audio-test-container {
        max-width: 700px;
        width: 90%;
        padding: 3rem;
        text-align: center;
        background-color: #ffffff;
        border: 1px solid #e0e0e0;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      .brand-logo {
        margin-bottom: 2.5rem;
      }

      .brand-name {
        margin: 0 0 0.5rem 0;
        font-family: 'LeJeuneDeck-Regular', serif;
        font-size: 2.5rem;
        color: #000000;
        letter-spacing: 2px;
      }

      .custom-text {
        font-weight: 400;
        letter-spacing: 3px;
      }

      .brand-tagline {
        font-family: 'Founders Grotesk Mono', monospace;
        font-size: 0.8rem;
        letter-spacing: 3px;
        color: #352023;
        text-transform: uppercase;
        margin-top: 0.5rem;
      }

      .audio-test-title {
        margin-bottom: 1rem;
        font-family: 'LeJeuneDeck-Regular', serif;
        font-size: 2rem;
        color: #000000;
        font-weight: normal;
        letter-spacing: 1px;
      }

      .audio-test-description {
        margin-bottom: 3rem;
        font-size: 0.9rem;
        color: #555555;
        line-height: 1.8;
        letter-spacing: 0.5px;
      }

      .recording-controls {
        margin-bottom: 2.5rem;
      }

      .record-btn {
        padding: 1rem 2rem;
        font-size: 0.9rem;
        background-color: transparent;
        color: #000000;
        border: 1px solid #000000;
        cursor: pointer;
        transition: all 0.3s ease;
        font-family: 'Founders Grotesk Mono', monospace;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-weight: 400;
        display: inline-flex;
        align-items: center;
        margin: 0 0.5rem;
      }

      .btn-icon {
        margin-right: 10px;
        display: flex;
        align-items: center;
      }

      .start-btn {
        background-color: #ffffff;
        color: #000000;
      }

      .start-btn:hover {
        background-color: #f5f5f5;
      }

      .stop-btn {
        background-color: #352023;
        color: #ffffff;
        border-color: #352023;
        animation: recordingPulse 1.5s infinite;
      }

      .stop-btn:hover {
        background-color: #4a2d31;
      }

      .recording-status {
        padding: 1rem;
        background-color: #f9f9f9;
        margin-bottom: 2.5rem;
        font-size: 0.9rem;
        color: #000000;
        letter-spacing: 0.5px;
      }

      .audio-controls {
        margin: 2.5rem 0;
        padding: 2rem;
        background-color: #f9f9f9;
        border: 1px solid #e0e0e0;
      }

      .audio-controls h3 {
        margin: 0 0 1.5rem 0;
        color: #000000;
        font-family: 'LeJeuneDeck-Regular', serif;
        font-weight: normal;
        letter-spacing: 1px;
        font-size: 1.2rem;
      }

      .audio-player {
        width: 100%;
        margin: 1.5rem 0;
        height: 40px;
      }

      .download-btn {
        padding: 0.75rem 1.5rem;
        background-color: transparent;
        color: #000000;
        border: 1px solid #000000;
        cursor: pointer;
        margin: 1.5rem 0;
        font-family: 'Founders Grotesk Mono', monospace;
        font-size: 0.8rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        display: inline-flex;
        align-items: center;
        transition: all 0.3s ease;
      }

      .download-btn:hover {
        background-color: #f5f5f5;
      }

      .recording-info {
        margin-top: 1.5rem;
        text-align: left;
        background-color: #ffffff;
        padding: 1.5rem;
        border: 1px solid #e0e0e0;
      }

      .recording-info p {
        margin: 0.5rem 0;
        color: #555555;
        font-size: 0.85rem;
        letter-spacing: 0.5px;
      }

      .back-button-container {
        margin-top: 2.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid #e0e0e0;
      }

      .back-btn {
        padding: 0.75rem 1.5rem;
        background-color: transparent;
        color: #000000;
        border: 1px solid #000000;
        cursor: pointer;
        font-family: 'Founders Grotesk Mono', monospace;
        font-size: 0.8rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        transition: all 0.3s ease;
      }

      .back-btn:hover {
        background-color: #f5f5f5;
      }

      .error-container {
        background-color: rgba(53, 32, 35, 0.05);
        border: 1px solid rgba(53, 32, 35, 0.2);
        padding: 1.5rem;
        color: #352023;
        margin: 1.5rem 0;
        text-align: left;
      }

      .icon-error {
        margin-right: 8px;
        display: inline-flex;
        align-items: center;
        vertical-align: middle;
      }

      .error-container h3 {
        margin: 0 0 1rem 0;
        font-size: 1rem;
        display: flex;
        align-items: center;
        font-family: 'LeJeuneDeck-Regular', serif;
        font-weight: normal;
        letter-spacing: 0.5px;
      }

      .error-container p {
        margin: 0;
        white-space: pre-line;
        font-size: 0.85rem;
        color: #555555;
        letter-spacing: 0.5px;
      }

      @keyframes recordingPulse {
        0%, 100% {
          box-shadow: 0 0 0 0 rgba(53, 32, 35, 0.4);
        }
        50% {
          box-shadow: 0 0 0 8px rgba(53, 32, 35, 0);
        }
      }
    </style>
  </head>
  <body>
    <div class="audio-test-container">
      <div class="brand-logo">
        <h1 class="brand-name">ENZO<span class="custom-text">CUSTOM</span></h1>
        <div class="brand-tagline">BESPOKE TAILORING</div>
      </div>
      
      <h2 class="audio-test-title">Audio Configuration</h2>
      
      <p class="audio-test-description">
        Test your microphone functionality before connecting to the virtual consultant
      </p>
      
      <!-- Recording Controls -->
      <div class="recording-controls">
        <button id="start-recording-btn" class="record-btn start-btn">
          <span class="btn-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="23"></line>
              <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
          </span>
          Start Recording
        </button>
        
        <button id="stop-recording-btn" class="record-btn stop-btn" style="display: none;">
          <span class="btn-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="6" y="6" width="12" height="12"></rect>
            </svg>
          </span>
          Stop Recording
        </button>
      </div>

      <!-- Status Display -->
      <div id="recording-status" class="recording-status">
        Ready to record
      </div>

      <!-- Audio Controls (shown after recording) -->
      <div id="audio-controls" class="audio-controls" style="display: none;">
        <h3>Recorded Audio</h3>
        
        <!-- Audio Player -->
        <audio id="audio-player" controls class="audio-player">
          Your browser does not support the audio element.
        </audio>
        
        <!-- Download Button -->
        <button id="download-btn" class="download-btn">
          <span class="btn-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
          </span>
          Download WAV File
        </button>
        
        <!-- Recording Info -->
        <div id="recording-info" class="recording-info">
          <p><strong>Duration:</strong> <span id="duration">0</span> seconds</p>
          <p><strong>File Size:</strong> <span id="file-size">0</span> KB</p>
        </div>
      </div>

      <!-- Error Display -->
      <div id="error-container" class="error-container" style="display: none;">
        <h3>
          <span class="icon-error">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
          </span>
          Error
        </h3>
        <p id="error-message"></p>
      </div>

      <!-- Back Button -->
      <div class="back-button-container">
        <a href="/" class="back-btn">
          <span class="btn-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"></line>
              <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
          </span>
          Back to Main App
        </a>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const startBtn = document.getElementById('start-recording-btn');
        const stopBtn = document.getElementById('stop-recording-btn');
        const downloadBtn = document.getElementById('download-btn');
        const audioPlayer = document.getElementById('audio-player');
        const recordingStatus = document.getElementById('recording-status');
        const audioControls = document.getElementById('audio-controls');
        const errorContainer = document.getElementById('error-container');
        const errorMessage = document.getElementById('error-message');
        const durationElement = document.getElementById('duration');
        const fileSizeElement = document.getElementById('file-size');

        let mediaRecorder = null;
        let audioChunks = [];
        let audioBlob = null;
        let recordingStartTime = 0;
        let durationInterval = null;
        let recordingDuration = 0;

        // Start recording
        startBtn.addEventListener('click', async function() {
          console.log("Starting audio recording...");
          try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            recordingStartTime = Date.now();

            mediaRecorder.ondataavailable = function(event) {
              if (event.data.size > 0) {
                audioChunks.push(event.data);
              }
            };

            mediaRecorder.onstop = function() {
              console.log("Recording stopped, creating audio blob");
              audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
              stream.getTracks().forEach(track => track.stop());
              
              // Update UI
              const url = URL.createObjectURL(audioBlob);
              audioPlayer.src = url;
              audioControls.style.display = 'block';
              
              // Calculate final duration
              recordingDuration = Math.round((Date.now() - recordingStartTime) / 1000);
              durationElement.textContent = recordingDuration;
              fileSizeElement.textContent = Math.round(audioBlob.size / 1024);
              
              recordingStatus.textContent = 'Recording completed';
              
              // Clear interval
              if (durationInterval) {
                clearInterval(durationInterval);
                durationInterval = null;
              }
            };

            mediaRecorder.start();
            
            // Update UI
            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';
            recordingStatus.textContent = 'Recording... 0s';
            errorContainer.style.display = 'none';
            
            // Start duration counter
            durationInterval = setInterval(function() {
              const elapsed = Math.round((Date.now() - recordingStartTime) / 1000);
              recordingStatus.textContent = `Recording... ${elapsed}s`;
            }, 1000);
            
            console.log("Audio recording started successfully");
          } catch (err) {
            console.error("Error starting audio recording:", err);
            errorMessage.textContent = `Error accessing microphone: ${err.message}`;
            errorContainer.style.display = 'block';
          }
        });

        // Stop recording
        stopBtn.addEventListener('click', function() {
          console.log("Stopping audio recording...");
          if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
            console.log("Audio recording stopped successfully");
          }
        });

        // Download audio
        downloadBtn.addEventListener('click', function() {
          if (!audioBlob) {
            errorMessage.textContent = "No audio recorded to download";
            errorContainer.style.display = 'block';
            return;
          }

          const url = URL.createObjectURL(audioBlob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `audio-test-${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.wav`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          
          console.log("Audio file downloaded");
        });
      });
    </script>
  </body>
</html>
